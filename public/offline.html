<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4A8BFF" />
    <title>OTLA sin conexión</title>
    <style>
      :root {
        color: #1a1f36;
        background: #f5f7fb;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(420px, 100%);
        border: 1px solid #e6eaf0;
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 18px 45px rgba(26, 31, 54, 0.08);
        overflow: hidden;
      }
      header {
        background: linear-gradient(135deg, #6c5ce7 0%, #4a8bff 100%);
        color: #ffffff;
        padding: 28px;
        text-align: center;
      }
      section {
        padding: 28px;
        text-align: center;
      }
      h1 {
        margin: 0;
        font-size: 24px;
      }
      p {
        margin: 12px 0 0;
        color: #6b7280;
        line-height: 1.5;
      }
      button {
        margin-top: 22px;
        border: 0;
        border-radius: 12px;
        background: #4a8bff;
        color: #ffffff;
        cursor: pointer;
        font-weight: 700;
        padding: 12px 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>OTLA</h1>
      </header>
      <section>
        <h1>Sin conexión</h1>
        <p>Necesitas conexión a internet para consultar y actualizar pagos.</p>
        <button type="button" onclick="window.location.reload()">Reintentar</button>
      </section>
    </main>
  </body>
</html>
